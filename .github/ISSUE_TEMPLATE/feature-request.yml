name: ✨ Feature request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Filling this out completely helps maintainers gauge whether it fits the action's scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case. What does the action not do today that you wish it did?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? An input name, behavior sketch, or example workflow snippet are all helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues, anything else.
